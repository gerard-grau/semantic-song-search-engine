// ─── UTILS ────────────────────────────────────────────────────────────────

function useWindowSize() {
  const [size, setSize] = useState({ w: window.innerWidth, h: window.innerHeight });
  useEffect(() => {
    const handle = () => setSize({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', handle);
    return () => window.removeEventListener('resize', handle);
  }, []);
  return size;
}

// ─── STAR FIELD ──────────────────────────────────────────────────────────

function Stars({ width, height, ambiance, palette }) {
  const count = Math.round(30 + ambiance * 2.2);
  const pal = PALETTES[palette] || PALETTES.amber;
  const stars = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 220; i++) {
      arr.push({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 1.3 + 0.2, op: Math.random() * 0.3 + 0.04 });
    }
    return arr;
  }, [width, height]);
  return (
    <g>{stars.slice(0, count).map((s, i) => <circle key={i} cx={s.x} cy={s.y} r={s.r} fill={pal.starColor} opacity={s.op} />)}</g>
  );
}

// ─── CANVAS ──────────────────────────────────────────────────────────────

const WORLD_W = 2400;
const WORLD_H = 1800;
const PADDING = 180;

function worldPos(song) {
  return {
    x: PADDING + song.ex * (WORLD_W - PADDING * 2),
    y: PADDING + (1 - song.ey) * (WORLD_H - PADDING * 2),
  };
}

function SongNode({ song, selected, hovered, onHover, onClick, scale, nodeForm, ambiance }) {
  const { x, y } = worldPos(song);
  const genre = GENRES[song.genre];
  const isActive = selected || hovered;
  const glowMult = 1 + ambiance * 0.025;
  const nodeR = Math.max(7, 8 / Math.pow(scale, 0.3));
  const labelSize = Math.max(10, 11 / Math.pow(scale, 0.25));

  const renderNode = () => {
    if (nodeForm === 'ring') {
      return (
        <>
          {isActive && <circle cx={x} cy={y} r={(nodeR + 14) * glowMult} fill={genre.color} opacity={0.13} />}
          <circle cx={x} cy={y} r={nodeR + 5} fill="none" stroke={genre.color} strokeWidth={isActive ? 2 : 1.2} opacity={isActive ? 0.9 : 0.45} style={{ transition: 'all 0.18s' }} />
          <circle cx={x} cy={y} r={nodeR * 0.35} fill={genre.color} opacity={isActive ? 1 : 0.4} />
        </>
      );
    }
    if (nodeForm === 'pulse') {
      return (
        <>
          <circle cx={x} cy={y} r={nodeR} fill={genre.color} opacity={0.18} className="song-pulse" style={{ animationDelay: `${(song.id * 0.37) % 2.2}s` }} />
          <circle cx={x} cy={y} r={nodeR * 0.55} fill={genre.color} opacity={isActive ? 1 : 0.7} style={{ transition: 'all 0.18s' }} />
          {isActive && <circle cx={x} cy={y} r={(nodeR + 16) * glowMult} fill={genre.color} opacity={0.14} />}
        </>
      );
    }
    // dot (default)
    return (
      <>
        {isActive && <circle cx={x} cy={y} r={(nodeR + 14) * glowMult} fill={genre.color} opacity={0.12} />}
        <circle cx={x} cy={y} r={nodeR + 6} fill={genre.color} opacity={isActive ? 0.22 : 0.06} style={{ transition: 'opacity 0.2s' }} />
        <circle cx={x} cy={y} r={nodeR} fill={isActive ? genre.color : "rgba(232,224,208,0.15)"} stroke={genre.color} strokeWidth={isActive ? 0 : 1.5} style={{ transition: 'all 0.18s' }} />
        {selected && <circle cx={x} cy={y} r={3} fill="white" opacity={0.9} />}
      </>
    );
  };

  return (
    <g style={{ cursor: 'pointer' }} onMouseEnter={() => onHover(song.id)} onMouseLeave={() => onHover(null)} onClick={() => onClick(song)}>
      {renderNode()}
      <text x={x} y={y - nodeR - 8} textAnchor="middle" fill={isActive ? genre.color : "rgba(232,224,208,0.55)"} fontSize={labelSize} fontFamily="'Space Mono', monospace" fontWeight={isActive ? "700" : "400"} style={{ pointerEvents: 'none', transition: 'all 0.18s' }}>{song.title}</text>
      <text x={x} y={y - nodeR - 8 - labelSize - 2} textAnchor="middle" fill={isActive ? "rgba(232,224,208,0.6)" : "rgba(232,224,208,0.28)"} fontSize={labelSize * 0.8} fontFamily="'Space Mono', monospace" style={{ pointerEvents: 'none', transition: 'all 0.18s' }}>{song.artist} {song.year ? `· ${song.year}` : ''}</text>
    </g>
  );
}

function ClusterZones({ ambiance }) {
  const opacity = 0.03 + ambiance * 0.0016;
  const zones = [
    { cx: 0.50, cy: 0.30, rx: 0.22, ry: 0.18, color: "var(--amber)" },
    { cx: 0.63, cy: 0.50, rx: 0.22, ry: 0.18, color: "var(--rose)" },
    { cx: 0.72, cy: 0.82, rx: 0.20, ry: 0.14, color: "var(--teal)" },
    { cx: 0.25, cy: 0.88, rx: 0.18, ry: 0.10, color: "var(--violet)" },
    { cx: 0.43, cy: 0.28, rx: 0.14, ry: 0.14, color: "oklch(0.7 0.14 130)" },
    { cx: 0.83, cy: 0.60, rx: 0.16, ry: 0.18, color: "oklch(0.72 0.14 30)" },
  ];
  return (
    <g opacity={opacity}>
      {zones.map((z, i) => {
        const cx = PADDING + z.cx * (WORLD_W - PADDING * 2);
        const cy = PADDING + (1 - z.cy) * (WORLD_H - PADDING * 2);
        const rx = z.rx * (WORLD_W - PADDING * 2);
        const ry = z.ry * (WORLD_H - PADDING * 2);
        return <ellipse key={i} cx={cx} cy={cy} rx={rx} ry={ry} fill={z.color} />;
      })}
    </g>
  );
}

// ─── MINIMAP ─────────────────────────────────────────────────────────────

function Minimap({ transform, viewW, viewH, onJump }) {
  const mmW = 140, mmH = 100;
  const scaleX = mmW / WORLD_W, scaleY = mmH / WORLD_H;
  const vpW = (viewW / transform.k) * scaleX;
  const vpH = (viewH / transform.k) * scaleY;
  const vpX = (-transform.x / transform.k) * scaleX;
  const vpY = (-transform.y / transform.k) * scaleY;
  return (
    <div style={{ position: 'fixed', bottom: 28, left: 28, background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 4, overflow: 'hidden', cursor: 'crosshair' }}
      onClick={e => { const r = e.currentTarget.getBoundingClientRect(); onJump((e.clientX - r.left) / mmW, (e.clientY - r.top) / mmH); }}>
      <svg width={mmW} height={mmH}>
        <rect width={mmW} height={mmH} fill="var(--bg)" />
        {SONGS.map(s => {
          const x = (PADDING + s.ex * (WORLD_W - PADDING * 2)) * scaleX;
          const y = (PADDING + (1 - s.ey) * (WORLD_H - PADDING * 2)) * scaleY;
          return <circle key={s.id} cx={x} cy={y} r={2.5} fill={GENRES[s.genre].color} opacity={0.7} />;
        })}
        <rect x={Math.max(0, vpX)} y={Math.max(0, vpY)} width={Math.min(vpW, mmW)} height={Math.min(vpH, mmH)} fill="none" stroke="rgba(255,255,255,0.3)" strokeWidth={1} />
      </svg>
    </div>
  );
}

  const [selectedSong, setSelectedSong] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [chips, setChips] = useState([]);
  const [inputVal, setInputVal] = useState('');
  const [similarTo, setSimilarTo] = useState(null);
  const isDragging = useRef(false);
  const dragStart = useRef(null);
  const lastTransform = useRef(transform);

  useEffect(() => { lastTransform.current = transform; }, [transform]);
  useEffect(() => {
    const handle = e => { if (e.key === 'Escape') setSelectedSong(null); };
    window.addEventListener('keydown', handle);
    return () => window.removeEventListener('keydown', handle);
  }, []);

  const filtered = useMemo(() => {
    // similarity mode overrides chip filters
    if (similarTo) {
      const ids = new Set([similarTo, ...(NEIGHBORS[similarTo] || [])]);
      return SONGS.filter(s => ids.has(s.id)).map(s => s.id);
    }
    if (!chips.length) return null;
    return SONGS.filter(s =>
      chips.every(chip => {
        const q = chip.toLowerCase();
        return s.title.toLowerCase().includes(q) ||
               s.artist.toLowerCase().includes(q) ||
               s.genre.includes(q) ||
               s.album.toLowerCase().includes(q);
      })
    ).map(s => s.id);
  }, [chips, similarTo]);

  // Commit a chip from the input
  const commitChip = useCallback(() => {
    const val = inputVal.trim();
    if (val && !chips.includes(val)) setChips(c => [...c, val]);
    setInputVal('');
  }, [inputVal, chips]);

  // Navigate map to a song and select it
  const navigateToSong = useCallback((song) => {
    const { x, y } = worldPos(song);
    const k = 2.2;
    setTransform({
      k,
      x: viewW / 2 - x * k,
      y: viewH / 2 - y * k,
    });
    setSelectedSong(song);
    setSimilarTo(null);
  }, [viewW, viewH]);

  // Descobreix: random song → zoom into its similarity neighborhood
  const descobreix = useCallback(() => {
    const pick = SONGS[Math.floor(Math.random() * SONGS.length)];
    const { x, y } = worldPos(pick);
    const k = 1.6;
    setTransform({ k, x: viewW / 2 - x * k, y: viewH / 2 - y * k });
    setSimilarTo(pick.id);
    setSelectedSong(pick);
    setChips([]);
  }, [viewW, viewH]);

  const onMouseDown = useCallback(e => {
    if (e.button !== 0) return;
    isDragging.current = false;
    dragStart.current = { mx: e.clientX, my: e.clientY, tx: lastTransform.current.x, ty: lastTransform.current.y };
  }, []);

  const onMouseMove = useCallback(e => {
    if (!dragStart.current) return;
    const ds = dragStart.current;
    const dx = e.clientX - ds.mx, dy = e.clientY - ds.my;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging.current = true;
    setTransform(t => ({ ...t, x: ds.tx + dx, y: ds.ty + dy }));
  }, []);

  const onMouseUp = useCallback(() => { dragStart.current = null; }, []);

  const onWheel = useCallback(e => {
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.001 * 1.2);
    const cx = e.clientX, cy = e.clientY;
    setTransform(t => {
      const newK = Math.max(0.3, Math.min(5, t.k * factor));
      const ratio = newK / t.k;
      return { k: newK, x: cx - (cx - t.x) * ratio, y: cy - (cy - t.y) * ratio };
    });
  }, []);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [onWheel]);

  const zoomBy = useCallback(factor => {
    setTransform(t => {
      const cx = viewW / 2, cy = viewH / 2;
      const newK = Math.max(0.3, Math.min(5, t.k * factor));
      const ratio = newK / t.k;
      return { k: newK, x: cx - (cx - t.x) * ratio, y: cy - (cy - t.y) * ratio };
    });
  }, [viewW, viewH]);

  const onMinimapJump = useCallback((mx, my) => {
    setTransform(t => ({ ...t, x: viewW / 2 - mx * WORLD_W * t.k, y: viewH / 2 - my * WORLD_H * t.k }));
  }, [viewW, viewH]);

  const onNodeClick = useCallback(song => {
    if (!isDragging.current) setSelectedSong(song);
  }, []);

  const panelOpen = !!selectedSong;

  return (
    <div style={{ width: '100vw', height: '100vh', overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}>
      <svg ref={svgRef} width={viewW} height={viewH}
        style={{ display: 'block', cursor: 'grab', userSelect: 'none' }}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
        <defs>
          <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"
            patternTransform={`translate(${transform.x % (60 * transform.k)},${transform.y % (60 * transform.k)}) scale(${transform.k})`}>
            <circle cx="30" cy="30" r="1" fill="rgba(255,255,255,0.04)" />
          </pattern>
          <radialGradient id={`bg-grad-${palette}`} cx="50%" cy="50%" r="70%">
            <stop offset="0%" stopColor={pal.grad0} />
            <stop offset="100%" stopColor={pal.grad1} />
          </radialGradient>
        </defs>
        <rect width={viewW} height={viewH} fill={`url(#bg-grad-${palette})`} />
        <rect width={viewW} height={viewH} fill="url(#grid)" />
        <g transform={`translate(${transform.x},${transform.y}) scale(${transform.k})`}>
          <Stars width={WORLD_W} height={WORLD_H} ambiance={ambiance} palette={palette} />
          <ClusterZones ambiance={ambiance} />
          <AxisLabels />
          {SONGS.map(song => {
            const dimmed = filtered && !filtered.includes(song.id);
            return (
              <g key={song.id} opacity={dimmed ? 0.18 : 1} style={{ transition: 'opacity 0.2s' }}>
                <SongNode song={song} selected={selectedSong?.id === song.id} hovered={hoveredId === song.id}
                  onHover={setHoveredId} onClick={onNodeClick} scale={transform.k} nodeForm={nodeForm} ambiance={ambiance} />
              </g>
            );
          })}
        </g>
      </svg>

      {/* TOP BAR */}
      <div style={{ position: 'fixed', top: 0, left: 0, right: panelOpen ? 'var(--panel-w)' : 0, padding: '18px 28px', display: 'flex', alignItems: 'center', gap: 24, background: 'linear-gradient(to bottom, rgba(14,13,11,0.92) 60%, transparent)', transition: 'right 0.35s cubic-bezier(0.22,1,0.36,1)', zIndex: 50, pointerEvents: 'none' }}>
        <div style={{ pointerEvents: 'auto' }}>
          <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 700, fontStyle: 'italic', color: 'var(--amber)', lineHeight: 1 }}>Cançoner</div>
          <div style={{ fontSize: 9, letterSpacing: '0.2em', color: 'var(--text-dimmer)', textTransform: 'uppercase', marginTop: 2 }}>Mapa semàntic de cançons catalanes</div>
        </div>
        <div style={{ flex: 1, maxWidth: 340, pointerEvents: 'auto', position: 'relative' }}>
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Cerca per títol, artista, gènere…"
            style={{ width: '100%', background: 'rgba(14,13,11,0.85)', border: '1px solid var(--border)', borderRadius: 3, color: 'var(--text)', fontFamily: 'Space Mono, monospace', fontSize: 11, padding: '9px 14px 9px 34px', outline: 'none', backdropFilter: 'blur(6px)' }} />
          <svg style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', opacity: 0.35 }} width={14} height={14} viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" strokeWidth="1.5" />
            <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" />
          </svg>
          {query && <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', fontSize: 10, color: 'var(--text-dimmer)', cursor: 'pointer' }} onClick={() => setQuery('')}>✕</span>}
        </div>
      </div>

      {/* LEGEND */}
      <div style={{ position: 'fixed', top: 80, left: 28, display: 'flex', flexDirection: 'column', gap: 8, zIndex: 50 }}>
        {Object.entries(GENRES).map(([key, g]) => (
          <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 7, height: 7, borderRadius: '50%', background: g.color }} />
            <span style={{ fontSize: 10, color: 'var(--text-dimmer)', letterSpacing: '0.06em' }}>{g.label}</span>
          </div>
        ))}
      </div>

      {/* ZOOM CONTROLS */}
      <div style={{ position: 'fixed', bottom: 28, right: panelOpen ? 'calc(var(--panel-w) + 28px)' : 28, display: 'flex', flexDirection: 'column', gap: 4, transition: 'right 0.35s cubic-bezier(0.22,1,0.36,1)', zIndex: 50 }}>
        {['+', '−', '⊡'].map((icon, i) => (
          <button key={i} onClick={() => {
            if (i === 0) zoomBy(1.3);
            else if (i === 1) zoomBy(1 / 1.3);
            else { const k = Math.max(viewW / WORLD_W, viewH / WORLD_H) * 0.88; setTransform({ k, x: (viewW - WORLD_W * k) / 2, y: (viewH - WORLD_H * k) / 2 }); }
          }} style={{ width: 34, height: 34, background: 'var(--bg2)', border: '1px solid var(--border)', color: 'var(--text-dim)', fontSize: i < 2 ? 18 : 14, cursor: 'pointer', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Space Mono, monospace' }}>{icon}</button>
        ))}
      </div>

      {/* SONG COUNT */}
      <div style={{ position: 'fixed', bottom: 28, left: '50%', transform: 'translateX(-50%)', fontSize: 10, color: 'var(--text-dimmer)', letterSpacing: '0.14em', textTransform: 'uppercase', zIndex: 50 }}>
        {filtered ? `${filtered.length} / ${SONGS.length} cançons` : `${SONGS.length} cançons`}
      </div>

      <Minimap transform={transform} viewW={viewW} viewH={viewH} onJump={onMinimapJump} />
      <DetailPanel song={selectedSong} onClose={() => setSelectedSong(null)} />
      {panelOpen && <div style={{ position: 'fixed', inset: 0, zIndex: 90 }} onClick={() => setSelectedSong(null)} />}

      <TweaksPanel tweaks={tweaks} setTweaks={setTweak}>
        <TweakSection label="Ambiance">
          <TweakSlider label="Void → Nebula" value={ambiance} min={0} max={100} step={1} onChange={v => setTweak('ambiance', v)} />
        </TweakSection>
        <TweakSection label="Node Form">
          <TweakRadio label="Style" value={nodeForm} options={[
            { value: 'dot',   label: 'Dot'   },
            { value: 'ring',  label: 'Ring'  },
            { value: 'pulse', label: 'Pulse' },
          ]} onChange={v => setTweak('nodeForm', v)} />
        </TweakSection>
        <TweakSection label="Palette">
          <TweakRadio label="Theme" value={palette} options={[
            { value: 'amber',  label: 'Amber'  },
            { value: 'cobalt', label: 'Cobalt' },
            { value: 'sepia',  label: 'Sépia'  },
          ]} onChange={v => setTweak('palette', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
